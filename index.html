<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nojima 商品情報アシスタント Ultimate (RAG Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto+Sans+JP', sans-serif; background-color: #f0f2f5; }
        .nojima-blue { color: #004098; }
        .nojima-bg-blue { background-color: #004098; }
        .chat-bubble { max-width: 85%; padding: 0.85rem 1.1rem; border-radius: 1.25rem; margin-bottom: 0.75rem; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; transition: all 0.2s ease; }
        .chat-user { background: linear-gradient(135deg, #004098 0%, #0056b3 100%); color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
        .chat-ai { background-color: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 0.25rem; border: 1px solid rgba(0,0,0,0.05); }
        .ios-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-900">

    <header class="nojima-bg-blue text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight">商品アシスタント (Web検索搭載)</h1>
            <button onclick="toggleSettings()" class="p-2 bg-blue-800/50 hover:bg-blue-700 rounded-full transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-4xl mx-auto w-full space-y-4">
        
        <div id="settings-panel" class="hidden ios-card p-5 space-y-4 animate-fade-in">
            <h3 class="font-bold flex items-center gap-2"><i data-lucide="key" class="w-5 h-5"></i> API設定</h3>
            <div class="space-y-3">
                <input type="password" id="gemini-api-key" class="w-full border p-3 rounded-xl text-sm" placeholder="Gemini API Key">
                <input type="password" id="search-api-key" class="w-full border p-3 rounded-xl text-sm" placeholder="Custom Search API Key">
                <input type="text" id="search-cx" class="w-full border p-3 rounded-xl text-sm" placeholder="検索エンジンID (cx)">
                <button onclick="saveSettings()" class="w-full nojima-bg-blue text-white py-3 rounded-xl text-sm font-bold">設定を保存</button>
            </div>
        </div>

        <section class="ios-card p-4 space-y-3">
            <h2 class="font-bold flex items-center gap-2"><i data-lucide="scan" class="w-5 h-5"></i> バーコード入力</h2>
            <div class="flex gap-2">
                <input type="text" id="manual-jan" class="flex-grow border p-3 rounded-xl text-sm" placeholder="JANコードを手動入力...">
                <button onclick="handleManualInput()" class="bg-slate-800 text-white px-5 py-3 rounded-xl text-sm font-bold">適用</button>
            </div>
            <p id="current-jan-display" class="text-sm font-bold text-blue-600 hidden">現在選択中: <span id="barcode-value"></span></p>
        </section>

        <section id="actions-section" class="grid grid-cols-2 gap-3 opacity-50 pointer-events-none transition-all">
            <button onclick="handleAction('details')" class="p-4 ios-card text-sm font-bold text-slate-800 hover:bg-blue-50">製品スペック詳細</button>
            <button onclick="handleAction('features')" class="p-4 ios-card text-sm font-bold text-slate-800 hover:bg-red-50">おすすめポイント</button>
        </section>

        <section class="ios-card flex flex-col h-[500px]">
            <div id="chat-history" class="flex-grow overflow-y-auto p-5 flex flex-col space-y-2 bg-slate-50/50">
                <div class="chat-bubble chat-ai">こんにちは！商品のJANコードを入力してください。最新情報を検索してお答えします。</div>
            </div>
            <div id="loading-indicator" class="hidden px-5 py-2 text-blue-600 text-xs font-bold bg-white">
                <i data-lucide="loader-2" class="w-4 h-4 inline animate-spin mr-1"></i> Webを検索＆分析中...
            </div>
            <div class="p-3 bg-white border-t">
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-grow bg-slate-100 border-none rounded-xl px-4 py-3 text-sm outline-none" placeholder="質問を入力..." onkeypress="if(event.key==='Enter') handleChat()">
                    <button onclick="handleChat()" class="nojima-bg-blue text-white p-3 rounded-xl hover:opacity-90">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script type="module">
        lucide.createIcons();

        let currentBarcode = "";
        const chatHistory = document.getElementById('chat-history');

        window.toggleSettings = () => document.getElementById('settings-panel').classList.toggle('hidden');
        
        window.saveSettings = () => {
            localStorage.setItem('gemini_api_key', document.getElementById('gemini-api-key').value.trim());
            localStorage.setItem('search_api_key', document.getElementById('search-api-key').value.trim());
            localStorage.setItem('search_cx', document.getElementById('search-cx').value.trim());
            alert('設定を保存しました！');
            toggleSettings();
        };

        window.onload = () => {
            document.getElementById('gemini-api-key').value = localStorage.getItem('gemini_api_key') || "";
            document.getElementById('search-api-key').value = localStorage.getItem('search_api_key') || "";
            document.getElementById('search-cx').value = localStorage.getItem('search_cx') || "";
        };

        window.handleManualInput = () => {
            const val = document.getElementById('manual-jan').value.trim();
            if (val) {
                currentBarcode = val;
                document.getElementById('manual-jan').value = "";
                document.getElementById('current-jan-display').classList.remove('hidden');
                document.getElementById('barcode-value').innerText = currentBarcode;
                document.getElementById('actions-section').classList.remove('opacity-50', 'pointer-events-none');
                addChatMessage("ai", `JANコード「${currentBarcode}」を設定しました。質問をどうぞ！`);
            }
        };

        function addChatMessage(role, text) {
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${role === 'user' ? 'chat-user' : 'chat-ai'} animate-fade-in`;
            bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            chatHistory.appendChild(bubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        window.handleAction = (type) => {
            if (!currentBarcode) return;
            const query = `JANコード ${currentBarcode} スペック 価格`;
            let instruction = "";
            
            if (type === 'details') {
                addChatMessage("user", "製品の詳しいスペックを教えてください。");
                instruction = "検索結果からこの製品の『詳細なスペック情報』を箇条書きでわかりやすく抽出してください。";
            } else {
                addChatMessage("user", "この商品のおすすめポイントは何ですか？");
                instruction = "検索結果からこの製品の『最大の売りや特徴、おすすめポイント』を3つほど抽出して魅力的に解説してください。";
            }
            processRAG(query, instruction);
        };

        window.handleChat = () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentBarcode) return;
            
            addChatMessage("user", text);
            input.value = "";
            
            const query = `JANコード ${currentBarcode} ${text}`;
            const instruction = `お客様から以下の質問がありました：「${text}」\n検索結果の情報を元に、プロの店員として親切に回答してください。`;
            
            processRAG(query, instruction);
        };

        // RAG (検索拡張生成) のメイン処理
        async function processRAG(searchQuery, aiInstruction) {
            const geminiKey = localStorage.getItem('gemini_api_key');
            const searchKey = localStorage.getItem('search_api_key');
            const searchCx = localStorage.getItem('search_cx');

            if (!geminiKey || !searchKey || !searchCx) {
                addChatMessage("ai", "APIキーが設定されていません。右上の設定から3つのキーを全て入力してください。");
                return;
            }

            document.getElementById('loading-indicator').classList.remove('hidden');

            try {
                // 1. Google Custom Search API でウェブ検索を実行
                const searchUrl = `https://www.googleapis.com/customsearch/v1?key=${searchKey}&cx=${searchCx}&q=${encodeURIComponent(searchQuery)}`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();

                if (searchData.error) throw new Error("検索APIエラー: " + searchData.error.message);

                // 2. 検索結果の上位5件をテキストとしてまとめる
                let webContext = "";
                if (searchData.items && searchData.items.length > 0) {
                    for (let i = 0; i < Math.min(5, searchData.items.length); i++) {
                        webContext += `【サイト名】 ${searchData.items[i].title}\n`;
                        webContext += `【内容】 ${searchData.items[i].snippet}\n\n`;
                    }
                } else {
                    webContext = "検索結果が見つかりませんでした。";
                }

                // 3. Geminiへのプロンプトを作成（検索結果 + 指示文）
                const finalPrompt = `
あなたはノジマのプロの店員です。以下の【ウェブ検索結果】の情報を読み解き、【指示】に従って回答を作成してください。

【ウェブ検索結果】
${webContext}

【指示】
${aiInstruction}

※注意：検索結果の中に該当商品の情報が見当たらない場合は、絶対に知ったかぶり（妄想）をせず、「申し訳ございません。最新情報から該当する商品を特定できませんでした。」と正直に答えてください。
`;

                // 4. Gemini API に送信（ツール指定なし = 無料枠でOK）
                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`;
                const geminiRes = await fetch(geminiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: finalPrompt }] }]
                    })
                });
                const geminiData = await geminiRes.json();

                if (geminiData.candidates && geminiData.candidates[0].content.parts[0].text) {
                    addChatMessage("ai", geminiData.candidates[0].content.parts[0].text);
                } else {
                    throw new Error(geminiData.error ? geminiData.error.message : "応答の解析に失敗しました。");
                }

            } catch (e) {
                console.error(e);
                addChatMessage("ai", "処理中にエラーが発生しました。\n詳細: " + e.message);
            } finally {
                document.getElementById('loading-indicator').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
